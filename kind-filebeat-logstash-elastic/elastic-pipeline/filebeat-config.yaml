apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: observability
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: filestream
        id: kubernetes-container-logs
        enabled: true
        paths:
          - /var/log/containers/*kubearmor*.log
          - /var/log/containers/*tetragon*.log
          - /var/log/containers/*cilium*.log
        parsers:
          - container: ~
        prospector.scanner.symlinks: true

    processors:
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
      - add_host_metadata: {}

    output.logstash:
      hosts: ["logstash.observability.svc:5044"]

    logging.level: info
