apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: observability
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf

    @INCLUDE input-kubernetes.conf
    @INCLUDE filter-kubernetes.conf
    @INCLUDE output-elasticsearch.conf

  input-kubernetes.conf: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*kubearmor*.log,/var/log/containers/*tetragon*.log,/var/log/containers/*cilium*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

  filter-kubernetes.conf: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            On

    [FILTER]
        Name   grep
        Match  kube.*
        Regex  $kubernetes['namespace_name'] ^(kubearmor|tetragon|kube-system)$

  output-elasticsearch.conf: |
    [OUTPUT]
        Name                  es
        Match                 kube.*
        Host                  quickstart-es-http.elastic-system.svc
        Port                  9200
        HTTP_User             elastic
        HTTP_Passwd           ${ELASTIC_PASSWORD}
        TLS                   On
        TLS.Verify            Off
        Logstash_Format       On
        Logstash_Prefix       runtime-security
        Suppress_Type_Name    On
        Replace_Dots          On

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
