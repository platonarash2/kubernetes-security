apiVersion: v1
kind: Namespace
metadata:
  labels:
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
  name: attacker
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
  name: kubearmor
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
  name: payments
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
  name: tetragon
---
apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  name: attacker-sa
  namespace: attacker
---
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  name: payments-api-sa
  namespace: payments
---
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  name: payments-client-sa
  namespace: payments
---
apiVersion: v1
data:
  README.md: |
    AppArmor support depends on the kind node image and host kernel.
    Use RuntimeDefault where supported; Localhost profiles require loading the profile into each kind node.
kind: ConfigMap
metadata:
  name: apparmor-guidance
  namespace: payments
---
apiVersion: v1
data:
  README.md: |
    Lab uses seccomp RuntimeDefault.
    Custom Localhost profiles require JSON files on each kind node.
kind: ConfigMap
metadata:
  name: seccomp-guidance
  namespace: payments
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: payments
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: payments-api
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attacker
  namespace: attacker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attacker
  template:
    metadata:
      labels:
        app: attacker
        platform.example.com/allow-service-account-token: "true"
        security-profile: attacker
    spec:
      automountServiceAccountToken: true
      containers:
      - command:
        - sh
        - -c
        - |
          while true; do
            sleep 3600
          done
        image: nicolaka/netshoot:latest
        name: attacker
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      serviceAccountName: attacker-sa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
        security-profile: web-api
    spec:
      automountServiceAccountToken: false
      containers:
      - image: nginxinc/nginx-unprivileged:stable-alpine
        name: app
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 250m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /tmp
          name: nginx-cache
      serviceAccountName: payments-api-sa
      volumes:
      - emptyDir: {}
        name: nginx-cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-client
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-client
  template:
    metadata:
      labels:
        app: payments-client
        security-profile: payments-client
    spec:
      automountServiceAccountToken: false
      containers:
      - command:
        - sh
        - -c
        - while true; do sleep 3600; done
        image: curlimages/curl:8.10.1
        name: client
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
      serviceAccountName: payments-client-sa
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: lab-trace-serviceaccount-token-access
spec:
  kprobes:
  - args:
    - index: 0
      type: file
    call: security_file_open
    selectors:
    - matchActions:
      - action: Post
      matchArgs:
      - index: 0
        operator: Prefix
        values:
        - /var/run/secrets/kubernetes.io/serviceaccount/token
        - /run/secrets/kubernetes.io/serviceaccount/token
    syscall: false
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: lab-trace-shell-exec
spec:
  kprobes:
  - args:
    - index: 0
      type: linux_binprm
    call: security_bprm_check
    selectors:
    - matchActions:
      - action: Post
      matchBinaries:
      - operator: In
        values:
        - /bin/sh
        - /bin/bash
        - /usr/bin/curl
        - /usr/bin/wget
        - /bin/nc
        - /usr/bin/nc
    syscall: false
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-payments
  namespace: payments
spec:
  egress: []
  endpointSelector: {}
  ingress: []
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: lab-require-automount-service-account-token-false
spec:
  background: true
  rules:
  - match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - payments
    name: require-automount-false
    validate:
      message: 'Application pods must set automountServiceAccountToken: false.'
      pattern:
        spec:
          automountServiceAccountToken: false
  validationFailureAction: Enforce
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: lab-require-secure-baseline
spec:
  background: true
  rules:
  - match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - payments
    name: require-secure-context
    validate:
      message: Payments pods must use secure baseline settings.
      pattern:
        spec:
          containers:
          - securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
  validationFailureAction: Enforce
---
apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy
metadata:
  name: monitor-serviceaccount-token-read
  namespace: attacker
spec:
  action: Audit
  file:
    matchPaths:
    - path: /var/run/secrets/kubernetes.io/serviceaccount/token
    - path: /run/secrets/kubernetes.io/serviceaccount/token
  selector:
    matchLabels:
      security-profile: attacker
---
apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy
metadata:
  name: monitor-serviceaccount-token-read
  namespace: payments
spec:
  action: Audit
  file:
    matchPaths:
    - path: /var/run/secrets/kubernetes.io/serviceaccount/token
    - path: /run/secrets/kubernetes.io/serviceaccount/token
  selector:
    matchLabels:
      security-profile: web-api
---
apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy
metadata:
  name: payments-runtime-policy
  namespace: payments
spec:
  action: Audit
  capabilities:
    matchCapabilities:
    - capability: sys_admin
    - capability: sys_ptrace
    - capability: net_admin
  file:
    matchPaths:
    - path: /etc/shadow
    - path: /etc/sudoers
  process:
    matchPaths:
    - path: /bin/sh
    - path: /bin/bash
    - path: /usr/bin/wget
    - path: /usr/bin/curl
    - path: /bin/nc
    - path: /usr/bin/nc
  selector:
    matchLabels:
      security-profile: web-api
